services:
  - type: web
    name: evently-api
    runtime: python
    repo: https://github.com/your-username/your-repo
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DB_HOST
        value: your_railway_tcp_proxy_domain
      - key: DB_PORT
        value: your_railway_tcp_proxy_port
      - key: DB_USER
        value: your_mysql_user
      - key: DB_PASSWORD
        value: your_mysql_password
      - key: DB_NAME
        value: evently_db
